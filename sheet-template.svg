<svg fill="none" viewBox="0 0 720 1100" width="720" height="1100"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
.root {
  box-sizing: border-box;
  max-width: 100%;
  background: #f3f2ef;
  color: #000000bf;
  font-family: -apple-system, system-ui, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  font-size: 14px;
  line-height: 1.45;
  padding: 0 0 20px 0;
}
.root * { box-sizing: border-box; }
.accent-bar {
  height: 3px;
  width: 100%;
  background: #0a66c2;
}
.warm-stripe {
  height: 44px;
  width: 100%;
  background: linear-gradient(90deg, #fff5eb 0%, #f0f4f8 50%, #e8eef5 100%);
  border-bottom: 1px solid #e0e0e0;
}
.card {
  margin: 0 16px;
  background: #ffffff;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 18px 22px 20px;
  position: relative;
  top: -28px;
}
.lead { margin-bottom: 2px; }
h1 {
  font-size: 1.35rem;
  font-weight: 600;
  color: rgba(0,0,0,.9);
  margin: 0 0 2px 0;
  letter-spacing: -0.02em;
}
.role {
  margin: 0 0 8px 0;
  font-size: 0.9rem;
  color: rgba(0,0,0,.58);
  font-weight: 400;
}
.meta {
  margin: 0 0 14px 0;
  font-size: 0.8125rem;
  color: rgba(0,0,0,.5);
  line-height: 1.4;
}
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 18px;
}
@media (max-width: 520px) {
  .grid-2 { grid-template-columns: 1fr; }
}
section.single { margin-top: 12px; }
section.block { margin: 0; }
h2 {
  font-size: 0.625rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: rgba(0,0,0,.48);
  margin: 0 0 6px 0;
}
ul {
  margin: 0;
  padding-left: 1.05em;
}
li {
  margin: 2px 0;
  color: rgba(0,0,0,.78);
  font-size: 0.875rem;
}
.inline {
  margin: 0;
  color: rgba(0,0,0,.82);
  font-size: 0.875rem;
  line-height: 1.4;
}
.embed {
  margin-top: 8px;
  overflow: hidden;
  border-radius: 8px;
  background: #fafaf9;
  border: 1px solid #e0e0e0;
}
.embed svg {
  display: block;
  max-width: 100%;
  height: auto;
}
.sep {
  height: 1px;
  background: #ebebeb;
  margin: 14px 0 12px;
}
            </style>
            <div class="root">
                <div class="accent-bar"></div>
                <div class="warm-stripe" aria-hidden="true"></div>
                <div class="card">
                    <div class="lead">
                        <h1>Alek Sh</h1>
                        <p class="role">Senior Unity3D/Unreal · XR · Full-stack</p>
                        <p class="meta">Belgrade, Serbia · 9+ years software · Unity/Unreal · XR · ADHD/ASD · @hermesiss</p>
                    </div>

                    <div class="grid-2">
                        <section class="block">
                            <h2>Expertise</h2>
                            <ul>
                                <li>Unity &#38; Unreal — shipping, tooling, constraints</li>
                                <li>XR systems (VR/AR), real-time 3D products</li>
                                <li>Full-stack integration around immersive stacks</li>
                            </ul>
                        </section>
                        <section class="block">
                            <h2>Operating style</h2>
                            <ul>
                                <li>Structured execution; depth on complex engineering</li>
                                <li>ADHD/ASD: explicit expectations, steady cadence</li>
                            </ul>
                        </section>
                        <section class="block">
                            <h2>Stack</h2>
                            <p class="inline">C#, Unity, Unreal · web/back-end integration · JetBrains, Unity/Unreal pipelines · design background</p>
                        </section>
                        <section class="block">
                            <h2>Focus</h2>
                            <ul>
                                <li>Senior Unity/Unreal &#38; XR for product organizations</li>
                                <li>Tooling, prototypes, accessibility-oriented interaction</li>
                            </ul>
                        </section>
                    </div>

                    <div class="sep"></div>

                    <section class="single">
                        <h2>Public metrics</h2>
                        <div class="embed">%%github-profile-trophy%%</div>
                    </section>

                    <section class="single">
                        <h2>Activity</h2>
                        <div class="embed">%%github-readme-activity-graph%%</div>
                    </section>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>
